name: Quality Gates Windows

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-static-analysis:
    name: Windows Static Analysis
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Prepare project files
        shell: cmd
        run: Setup.bat vs2022

      - name: Build solution
        shell: pwsh
        run: ./Scripts/CI/build_windows.ps1 -Configuration Debug -LogPath Build/Logs/windows-quality-build.log

      - name: Run tests
        shell: pwsh
        run: ./Build/windows-x86_64/Debug/Test/Test.exe

      - name: Run MSVC code analysis
        shell: pwsh
        run: ./Scripts/CI/run_windows_code_analysis.ps1 -Configuration Debug -RulesetPath Scripts/CI/LifeNativeRecommended.ruleset -LogPath Build/Logs/windows-code-analysis.log

      - name: Upload Windows quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-quality-logs
          path: |
            Build/Logs/windows-quality-build.log
            Build/Logs/windows-code-analysis.log
            Build/windows-x86_64/Debug/Runtime/**
            Build/windows-x86_64/Debug/Test/**
          if-no-files-found: error
