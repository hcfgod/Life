name: Quality Gates Windows

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-static-analysis:
    uses: ./.github/workflows/reusable-platform-job.yml
    with:
      job_name: Windows Static Analysis
      runs_on: windows-2022
      platform: windows
      dependency_profile: windows
      premake_cache_dir: windows
      cmake_cache_dir: windows
      sdl_cache_dir: windows/x64
      setup_command: Setup.bat vs2022 --arch=x64
      build_command: ./Scripts/CI/build_windows.ps1 -Configuration Debug -Platform x64 -LogPath Build/Logs/windows-quality-build.log
      test_command: ./Scripts/CI/run_windows_tests.ps1 -Configuration Debug -Platform x64
      analysis_command: ./Scripts/CI/run_windows_code_analysis.ps1 -Configuration Debug -RulesetPath Scripts/CI/LifeNativeRecommended.ruleset -LogPath Build/Logs/windows-code-analysis.log
      artifact_name: windows-quality-logs
      artifact_path: |
        Build/Logs/windows-quality-build.log
        Build/Logs/windows-code-analysis.log
        Build/windows-*/Debug/Runtime/**
        Build/windows-*/Debug/Test/**
