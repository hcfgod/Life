name: Quality Gates macOS

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  macos-quality-gates:
    name: macOS ${{ matrix.gate_name }}
    runs-on: macos-15-intel
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - gate_name: Clang-Tidy
            premake_args: ''
            run_clang_tidy: true
            sanitizer_options: ''
            timeout_minutes: 30
          - gate_name: ASan+UBSan
            premake_args: '--asan --ubsan'
            run_clang_tidy: false
            sanitizer_options: 'ASAN_OPTIONS=detect_leaks=1:strict_string_checks=1 UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1'
            timeout_minutes: 30
          - gate_name: TSan
            premake_args: '--tsan'
            run_clang_tidy: false
            sanitizer_options: 'TSAN_OPTIONS=halt_on_error=1:second_deadlock_stack=1:history_size=7'
            timeout_minutes: 45
    env:
      HOMEBREW_NO_AUTO_UPDATE: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          brew install llvm bear
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Make scripts executable
        run: chmod +x Setup.sh Scripts/CI/*.sh

      - name: Prepare project files
        env:
          CC: clang
          CXX: clang++
        run: ./Setup.sh gmake2 ${{ matrix.premake_args }}

      - name: Build with compilation database
        if: matrix.run_clang_tidy
        env:
          CC: clang
          CXX: clang++
        run: |
          mkdir -p Build/compile_commands/macos
          bear --output Build/compile_commands/macos/compile_commands.json -- ./Scripts/CI/build_make.sh Debug clean all
          python Scripts/CI/normalize_compile_commands.py Build/compile_commands/macos/compile_commands.json --repo-root . --project-root Engine --project-root Runtime --project-root Test

      - name: Select clang-tidy files
        if: matrix.run_clang_tidy
        run: |
          python Scripts/CI/collect_changed_files.py \
            --repo-root . \
            --event-name "${{ github.event_name }}" \
            --base-ref "${{ github.base_ref }}" \
            --base-sha "${{ github.event.before }}" \
            --head-sha "${{ github.sha }}" \
            --pattern '^(Engine|Runtime|Test)/.*\.(c|cc|cpp|cxx|mm)$' \
            --compile-commands Build/compile_commands/macos/compile_commands.json \
            --fallback-compile-db-pattern '^(Engine|Runtime|Test)/.*\.(c|cc|cpp|cxx|mm)$' \
            --output Build/Logs/macos-clang-tidy-files.txt

      - name: Run clang-tidy
        if: matrix.run_clang_tidy
        run: |
          python Scripts/CI/run_clang_tidy.py \
            --repo-root . \
            --compile-commands Build/compile_commands/macos/compile_commands.json \
            --files Build/Logs/macos-clang-tidy-files.txt \
            --clang-tidy-binary clang-tidy \
            --jobs 4

      - name: Build sanitizer configuration
        if: ${{ !matrix.run_clang_tidy }}
        env:
          CC: clang
          CXX: clang++
        run: ./Scripts/CI/build_make.sh Debug clean all

      - name: Run sanitizer tests
        if: ${{ !matrix.run_clang_tidy }}
        env:
          CC: clang
          CXX: clang++
        run: ${{ matrix.sanitizer_options }} ./Scripts/CI/run_tests.sh Debug

      - name: Upload macOS quality artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: macos-${{ matrix.gate_name }}
          path: |
            Build/compile_commands/macos/compile_commands.json
            Build/Logs/macos-clang-tidy-files.txt
            Build/macosx-*/Debug/Runtime/**
            Build/macosx-*/Debug/Test/**
          if-no-files-found: ignore
