name: Test Linux

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test-linux:
    uses: ./.github/workflows/reusable-platform-job.yml
    with:
      job_name: Build and Test Linux
      runs_on: ubuntu-latest
      platform: linux
      dependency_profile: linux
      premake_cache_dir: linux
      cmake_cache_dir: linux
      sdl_cache_dir: linux/x64
      setup_command: ./Setup.sh gmake2 --arch=x64
      build_command: ./Scripts/CI/build_make.sh Debug clean all
      test_command: ./Scripts/CI/run_tests.sh Debug
      artifact_name: linux-debug-build
      artifact_path: |
        Build/linux-*/Debug/Runtime/**
        Build/linux-*/Debug/Test/**
      cc: clang
      cxx: clang++
