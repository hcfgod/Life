name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_release_assets:
    name: Release ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runs_on: windows-2022
            platform: windows
            dependency_profile: windows
            premake_cache_dir: windows
            cmake_cache_dir: windows
            sdl_cache_dir: windows/x64
            setup_command: Setup.bat vs2022 --arch=x64
            build_command: ./Scripts/CI/build_windows.ps1 -Configuration Dist -Platform x64 -LogPath Build/Logs/windows-release-msbuild.log
            package_command: python Scripts/CI/package_runtime.py --input-dir Build/windows-*/Dist/Runtime --output Build/Artifacts/Life-windows-x64.zip --format zip
            artifact_path: Build/Artifacts/Life-windows-x64.zip
            cc: ''
            cxx: ''
          - name: linux-x64
            runs_on: ubuntu-latest
            platform: linux
            dependency_profile: linux
            premake_cache_dir: linux
            cmake_cache_dir: linux
            sdl_cache_dir: linux/x64
            setup_command: ./Setup.sh gmake2 --arch=x64
            build_command: ./Scripts/CI/build_make.sh Dist clean all
            package_command: python Scripts/CI/package_runtime.py --input-dir Build/linux-*/Dist/Runtime --output Build/Artifacts/Life-linux-x64.tar.gz --format gztar
            artifact_path: Build/Artifacts/Life-linux-x64.tar.gz
            cc: clang
            cxx: clang++
          - name: macos-x64
            runs_on: macos-15-intel
            platform: macos
            dependency_profile: macos-llvm
            premake_cache_dir: macosx
            cmake_cache_dir: macos
            sdl_cache_dir: macos/x64
            setup_command: ./Setup.sh gmake2 --arch=x64
            build_command: ./Scripts/CI/build_make.sh Dist clean all
            package_command: python Scripts/CI/package_runtime.py --input-dir Build/macosx-*/Dist/Runtime --output Build/Artifacts/Life-macos-x64.tar.gz --format gztar
            artifact_path: Build/Artifacts/Life-macos-x64.tar.gz
            cc: clang
            cxx: clang++
          - name: macos-arm64
            runs_on: macos-14
            platform: macos
            dependency_profile: macos-llvm
            premake_cache_dir: macosx
            cmake_cache_dir: macos
            sdl_cache_dir: macos/arm64
            setup_command: ./Setup.sh gmake2 --arch=arm64
            build_command: ./Scripts/CI/build_make.sh Dist clean all
            package_command: python Scripts/CI/package_runtime.py --input-dir Build/macosx-*/Dist/Runtime --output Build/Artifacts/Life-macos-arm64.tar.gz --format gztar
            artifact_path: Build/Artifacts/Life-macos-arm64.tar.gz
            cc: clang
            cxx: clang++
    uses: ./.github/workflows/reusable-platform-job.yml
    with:
      job_name: Release ${{ matrix.name }}
      runs_on: ${{ matrix.runs_on }}
      platform: ${{ matrix.platform }}
      dependency_profile: ${{ matrix.dependency_profile }}
      premake_cache_dir: ${{ matrix.premake_cache_dir }}
      cmake_cache_dir: ${{ matrix.cmake_cache_dir }}
      sdl_cache_dir: ${{ matrix.sdl_cache_dir }}
      setup_command: ${{ matrix.setup_command }}
      build_command: ${{ matrix.build_command }}
      package_command: ${{ matrix.package_command }}
      artifact_name: ${{ matrix.name }}-release-artifact
      artifact_path: ${{ matrix.artifact_path }}
      artifact_if_no_files: error
      cc: ${{ matrix.cc }}
      cxx: ${{ matrix.cxx }}

  publish_release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build_release_assets

    steps:
      - name: Download Windows release artifact
        uses: actions/download-artifact@v7
        with:
          name: windows-x64-release-artifact
          path: Build/ReleaseAssets

      - name: Download Linux release artifact
        uses: actions/download-artifact@v7
        with:
          name: linux-x64-release-artifact
          path: Build/ReleaseAssets

      - name: Download macOS release artifact
        uses: actions/download-artifact@v7
        with:
          name: macos-x64-release-artifact
          path: Build/ReleaseAssets

      - name: Download macOS Apple Silicon release artifact
        uses: actions/download-artifact@v7
        with:
          name: macos-arm64-release-artifact
          path: Build/ReleaseAssets

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Build/ReleaseAssets/*
          fail_on_unmatched_files: true
