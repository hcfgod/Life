name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_release_assets:
    name: Release ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runs_on: windows-2022
            setup_command: Setup.bat vs2022
            build_command: ./Scripts/CI/build_windows.ps1 -Configuration Dist -LogPath Build/Logs/windows-release-msbuild.log
            package_command: python Scripts/CI/package_runtime.py --input-dir Build/windows-x86_64/Dist/Runtime --output Build/Artifacts/Life-windows-x64.zip --format zip
            artifact_path: Build/Artifacts/Life-windows-x64.zip
          - name: linux-x64
            runs_on: ubuntu-latest
            setup_command: ./Setup.sh gmake2
            build_command: ./Scripts/CI/build_make.sh Dist clean all
            package_command: python Scripts/CI/package_runtime.py --input-dir Build/linux-x86_64/Dist/Runtime --output Build/Artifacts/Life-linux-x64.tar.gz --format gztar
            artifact_path: Build/Artifacts/Life-linux-x64.tar.gz
          - name: macos-x64
            runs_on: macos-13
            setup_command: ./Setup.sh gmake2
            build_command: ./Scripts/CI/build_make.sh Dist clean all
            package_command: python Scripts/CI/package_runtime.py --input-dir Build/macosx-x86_64/Dist/Runtime --output Build/Artifacts/Life-macos-x64.tar.gz --format gztar
            artifact_path: Build/Artifacts/Life-macos-x64.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up MSBuild
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            pkg-config \
            ninja-build \
            libaudio-dev \
            libjack-dev \
            libsndio-dev \
            libusb-1.0-0-dev \
            libasound2-dev \
            libpulse-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxrender-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libdrm-dev \
            libgbm-dev \
            libdbus-1-dev \
            libudev-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Make scripts executable
        if: runner.os != 'Windows'
        run: chmod +x Setup.sh Scripts/CI/*.sh

      - name: Prepare project files (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: ${{ matrix.setup_command }}

      - name: Prepare project files (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.setup_command }}

      - name: Build release configuration (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.build_command }}

      - name: Build release configuration (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CC: clang
          CXX: clang++
        run: ${{ matrix.build_command }}

      - name: Package runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.package_command }}

      - name: Package runtime (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.package_command }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-release-artifact
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish_release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build_release_assets

    steps:
      - name: Download Windows release artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-release-artifact
          path: Build/ReleaseAssets

      - name: Download Linux release artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-release-artifact
          path: Build/ReleaseAssets

      - name: Download macOS release artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-release-artifact
          path: Build/ReleaseAssets

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Build/ReleaseAssets/*
          fail_on_unmatched_files: true
